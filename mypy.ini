[mypy]
python_version = 3.12
ignore_missing_imports = true
check_untyped_defs = true
disallow_untyped_defs = false
warn_unused_ignores = true
warn_return_any = false
disable_error_code = union-attr, arg-type, assignment, prop-decorator
explicit_package_bases = true

[mypy-app.models.*]
ignore_errors = true

[mypy-app.exceptions.*]
ignore_errors = true

[mypy-tests.*]
ignore_errors = true
