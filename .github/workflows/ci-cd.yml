name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  DATABASE_URL: mysql+pymysql://root:testpw@localhost:3306/shopping_cart_test_db
  IMAGE_NAME: husnaib/cartapi

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install linting tools
        run: pip install ruff bandit mypy

      - name: Ruff — lint
        run: ruff check app/ tests/

      - name: Ruff — format check
        run: ruff format --check app/ tests/

      - name: Bandit — security scan
        run: bandit -r app/ -c pyproject.toml

      - name: mypy — type check
        run: mypy --explicit-package-bases app/

  test:
    needs: lint
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpw
          MYSQL_DATABASE: shopping_cart_test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -uroot -ptestpw"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=30s

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Apply migrations
        run: alembic upgrade head

      - name: Run tests with coverage
        run: pytest --cov --cov-fail-under=85 --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Newman
        run: npm install -g newman

      - name: Start API and Run Newman tests
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 15); do
            curl -fsS http://localhost:8000/ && break
            echo "waiting for uvicorn..."
            sleep 2
          done
          newman run postman/CartAPI.postman_collection.json \
            -e postman/CartAPI.postman_environment.json \
            --reporters cli

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -eu
            echo "==> Pulling latest code"
            cd /home/ubuntu/cartapi
            git reset --hard
            git pull origin main

            echo "==> Executing blue-green deployment script"
            chmod +x scripts/blue_green_deploy.sh
            ./scripts/blue_green_deploy.sh
