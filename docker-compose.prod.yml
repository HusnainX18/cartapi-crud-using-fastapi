# =============================================================================
# docker-compose.prod.yml - CartAPI production stack for EC2
# =============================================================================
# Deploys the pre-built image from DockerHub (husnaib/cartapi)
# in a Blue-Green deployment architecture with Nginx reverse proxy.
#
# Environment variables (set in .env or passed via SSH):
#   MYSQL_ROOT_PASSWORD  (required) - root password for MySQL
#   MYSQL_DATABASE       (default: shopping_cart_db)
#   CARTAPI_TAG          (default: latest)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # MySQL 8.0
  # ---------------------------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: cartapi-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-shopping_cart_db}
    command:
      - --innodb-buffer-pool-size=256M
      - --max-connections=100
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - cartapi-net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ---------------------------------------------------------------------------
  # API - Blue Environment
  # ---------------------------------------------------------------------------
  api-blue:
    image: husnaib/cartapi:${CARTAPI_TAG:-latest}
    container_name: cartapi-api-blue
    restart: unless-stopped
    environment:
      # If using AWS RDS, set DATABASE_URL in your host .env and optionally comment out the 'depends_on' block below.
      DATABASE_URL: ${DATABASE_URL:-mysql+pymysql://root:${MYSQL_ROOT_PASSWORD}@db:3306/${MYSQL_DATABASE:-shopping_cart_db}}
      APP_NAME: CartAPI
      APP_VERSION: 1.0.1
      DEBUG: "False"
      LOG_LEVEL: INFO
      LOG_TO_FILE: "False"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/"]
      interval: 10s
      timeout: 3s
      start_period: 15s
      retries: 3
    logging:
      driver: awslogs
      options:
        awslogs-group: /cartapi/api
        awslogs-region: us-east-1
        awslogs-create-group: "true"
        tag: "api-blue"
    networks:
      - cartapi-net
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ---------------------------------------------------------------------------
  # API - Green Environment
  # ---------------------------------------------------------------------------
  api-green:
    image: husnaib/cartapi:${CARTAPI_TAG:-latest}
    container_name: cartapi-api-green
    restart: unless-stopped
    environment:
      # If using AWS RDS, set DATABASE_URL in your host .env and optionally comment out the 'depends_on' block below.
      DATABASE_URL: ${DATABASE_URL:-mysql+pymysql://root:${MYSQL_ROOT_PASSWORD}@db:3306/${MYSQL_DATABASE:-shopping_cart_db}}
      APP_NAME: CartAPI
      APP_VERSION: 1.0.1
      DEBUG: "False"
      LOG_LEVEL: INFO
      LOG_TO_FILE: "False"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/"]
      interval: 10s
      timeout: 3s
      start_period: 15s
      retries: 3
    logging:
      driver: awslogs
      options:
        awslogs-group: /cartapi/api
        awslogs-region: us-east-1
        awslogs-create-group: "true"
        tag: "api-green"
    networks:
      - cartapi-net
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: cartapi-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/dynamic:/etc/nginx/dynamic:ro
    depends_on:
      - api-blue
      - api-green
    networks:
      - cartapi-net

# -----------------------------------------------------------------------------
# Named volumes + networks
# -----------------------------------------------------------------------------
volumes:
  mysql_data:
    name: cartapi_mysql_data

networks:
  cartapi-net:
    name: cartapi-net
    driver: bridge
